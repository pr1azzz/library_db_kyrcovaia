<!doctype html>
<html lang="ru" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ИС Библиотеки | Дашборд</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body data-page="dashboard">
    <header class="topbar shadow-sm">
        <div class="container-fluid header-shell">
            <div class="header-brand">
                <h1 class="m-0 app-title">Library IS</h1>
                <button id="themeToggleBtn" class="btn btn-sm btn-outline-light d-lg-none" type="button">Тема</button>
            </div>

            <nav class="nav nav-pills nav-compact header-nav" id="mainNav">
                <a class="nav-link" href="/dashboard" data-page="dashboard">Дашборд</a>
                <a class="nav-link" href="/books" data-page="books">Книги</a>
                <a class="nav-link" href="/branches" data-page="branches">Филиалы</a>
                <a class="nav-link" href="/reports" data-page="reports" data-admin-only>Отчеты</a>
            </nav>

            <div class="header-tools">
                <button id="themeToggleBtnDesktop" class="btn btn-sm btn-outline-light d-none d-lg-inline-flex" type="button">
                    Сменить тему
                </button>
                <div id="authBox" class="auth-box d-flex align-items-center gap-2 flex-wrap justify-content-end"></div>
            </div>
        </div>
    </header>

    <main class="container-fluid main-content">
        <div class="row g-3 mb-4">
            <div class="col-12 col-md-4">
                <div class="stat-card">
                    <div class="stat-label">Всего книг</div>
                    <div id="statBooks" class="stat-value">0</div>
                </div>
            </div>
            <div class="col-12 col-md-4">
                <div class="stat-card">
                    <div class="stat-label">Филиалы</div>
                    <div id="statBranches" class="stat-value">0</div>
                </div>
            </div>
            <div class="col-12 col-md-4">
                <div class="stat-card">
                    <div class="stat-label">Факультеты</div>
                    <div id="statFaculties" class="stat-value">0</div>
                </div>
            </div>
        </div>

        <div class="card section-card mb-4">
            <div class="card-body">
                <h2 class="h5 mb-3">Быстрый поиск книги</h2>
                <form id="quickSearchForm" class="row g-2 align-items-end">
                    <div class="col-12 col-md-8 col-lg-6">
                        <label for="quickSearchInput" class="form-label">Название книги</label>
                        <input id="quickSearchInput" type="text" class="form-control" placeholder="Введите название книги">
                    </div>
                    <div class="col-12 col-md-4 col-lg-2 d-grid">
                        <button class="btn btn-primary" type="submit">Найти</button>
                    </div>
                </form>
            </div>
        </div>

        <div class="card section-card">
            <div class="card-body">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h2 class="h5 mb-0">Результаты поиска</h2>
                    <a class="btn btn-outline-secondary btn-sm" href="/books">Перейти к книгам</a>
                </div>
                <div class="table-responsive">
                    <table class="table table-striped align-middle" id="dashboardSearchTable">
                        <thead>
                            <tr>
                                <th>Название</th>
                                <th>Автор</th>
                                <th>Год</th>
                                <th>Цена</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <div class="position-fixed top-0 end-0 p-3 toast-zone">
        <div id="appToast" class="toast align-items-center border-0" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="d-flex">
                <div id="appToastBody" class="toast-body"></div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/app.js"></script>
</body>
</html>
