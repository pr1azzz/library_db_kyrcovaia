<!doctype html>
<html lang="ru" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0f7285">
    <title>ИС Библиотеки | Кабинет</title>
    <link rel="manifest" href="/manifest.webmanifest">
    <link rel="icon" href="/static/icons/icon.svg" type="image/svg+xml">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/styles.css?v=20260602-4">
</head>
<body data-page="account">
    <header class="topbar shadow-sm">
        <div class="container-fluid header-shell">
            <div class="header-brand">
                <h1 class="m-0 app-title">Library IS</h1>
                <button id="themeToggleBtn" class="btn btn-sm btn-outline-light d-lg-none" type="button">Тема</button>
            </div>

            <nav class="nav nav-pills nav-compact header-nav" id="mainNav">
                <a class="nav-link" href="/dashboard" data-page="dashboard">Дашборд</a>
                <a class="nav-link" href="/books" data-page="books">Книги</a>
                <a class="nav-link" href="/branches" data-page="branches">Филиалы</a>
                <a class="nav-link" href="/reports" data-page="reports" data-admin-only>Отчеты</a>
            </nav>

            <div class="header-tools">
                <button id="themeToggleBtnDesktop" class="btn btn-sm btn-outline-light d-none d-lg-inline-flex" type="button">
                    Сменить тему
                </button>
                <div id="authBox" class="auth-box d-flex align-items-center gap-2 flex-wrap justify-content-end"></div>
            </div>
        </div>
    </header>

    <main class="container-fluid main-content">
        <h2 class="h3 page-title mb-3">Личный кабинет</h2>

        <div class="row g-3 mb-3">
            <div class="col-12 col-xl-7">
                <div class="card section-card h-100">
                    <div class="card-body" id="accountProfile"></div>
                </div>
            </div>
            <div class="col-12 col-xl-5">
                <div class="card section-card h-100">
                    <div class="card-body">
                        <h3 class="h5 mb-3">Настройки профиля</h3>
                        <form id="profileForm" class="row g-2">
                            <div class="col-12">
                                <label for="profileFullName" class="form-label">Имя пользователя</label>
                                <input id="profileFullName" type="text" class="form-control" required>
                            </div>
                            <div class="col-12 col-md-6">
                                <label for="profilePassword" class="form-label">Новый пароль</label>
                                <input id="profilePassword" type="password" minlength="6" class="form-control" placeholder="Не менять">
                            </div>
                            <div class="col-12 col-md-6">
                                <label for="profilePasswordConfirm" class="form-label">Повторите пароль</label>
                                <input id="profilePasswordConfirm" type="password" minlength="6" class="form-control" placeholder="Не менять">
                            </div>
                            <div class="col-12 d-grid">
                                <button class="btn btn-primary" type="submit">Сохранить профиль</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <div class="card section-card mb-3" data-admin-only>
            <div class="card-body">
                <h3 class="h5 mb-3">Ожидающие подтверждения</h3>
                <div class="table-responsive">
                    <table class="table table-striped align-middle" id="pendingRequestsTable">
                        <thead>
                            <tr>
                                <th>Студент</th>
                                <th>Книга</th>
                                <th>Филиал</th>
                                <th>Тип</th>
                                <th>Дата</th>
                                <th class="text-end">Действия</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="card section-card">
            <div class="card-body">
                <div class="d-flex flex-column flex-lg-row justify-content-between align-items-lg-center gap-2 mb-3">
                    <h3 class="h5 m-0" id="accountHistoryTitle">История выдач</h3>
                    <form id="adminRequestFilterForm" class="row g-2 align-items-end request-filter" data-admin-only>
                        <div class="col-12 col-md-5">
                            <label for="requestStudentFilter" class="form-label small">Студент</label>
                            <input id="requestStudentFilter" type="search" class="form-control" placeholder="ФИО студента">
                        </div>
                        <div class="col-6 col-md-3">
                            <label for="requestDateFrom" class="form-label small">Дата с</label>
                            <input id="requestDateFrom" type="date" class="form-control">
                        </div>
                        <div class="col-6 col-md-3">
                            <label for="requestDateTo" class="form-label small">Дата по</label>
                            <input id="requestDateTo" type="date" class="form-control">
                        </div>
                        <div class="col-12 col-md-1 d-grid">
                            <button class="btn btn-outline-secondary" type="button" id="requestFilterReset">Сброс</button>
                        </div>
                    </form>
                </div>
                <div class="table-responsive">
                    <table class="table table-striped align-middle" id="accountLoansTable">
                        <thead></thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <div class="position-fixed top-0 end-0 p-3 toast-zone">
        <div id="appToast" class="toast align-items-center border-0" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="d-flex">
                <div id="appToastBody" class="toast-body"></div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/app.js?v=20260602-4"></script>
</body>
</html>
