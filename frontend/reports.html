<!doctype html>
<html lang="ru" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ИС Библиотеки | Отчеты</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body data-page="reports">
    <header class="topbar shadow-sm">
        <div class="container-fluid py-3 d-flex flex-column flex-lg-row align-items-lg-center gap-3">
            <div class="d-flex align-items-center justify-content-between w-100 w-lg-auto">
                <h1 class="m-0 app-title">Library IS</h1>
                <button id="themeToggleBtn" class="btn btn-sm btn-outline-light d-lg-none" type="button">Тема</button>
            </div>

            <nav class="nav nav-pills nav-fill nav-compact flex-grow-1" id="mainNav">
                <a class="nav-link" href="/dashboard" data-page="dashboard">Дашборд</a>
                <a class="nav-link" href="/books" data-page="books">Книги</a>
                <a class="nav-link" href="/branches" data-page="branches">Филиалы</a>
                <a class="nav-link" href="/account" data-page="account">Кабинет</a>
                <a class="nav-link" href="/reports" data-page="reports" data-admin-only>Отчеты</a>
            </nav>

            <button id="themeToggleBtnDesktop" class="btn btn-sm btn-outline-light d-none d-lg-inline-flex" type="button">
                Сменить тему
            </button>
        </div>
    </header>

    <main class="container-fluid main-content">
        <h2 class="h3 page-title mb-3">Отчеты</h2>

        <div class="row g-3">
            <div class="col-12 col-xl-6">
                <div class="card section-card h-100">
                    <div class="card-body">
                        <h3 class="h5 mb-3">Отчет по книге и филиалу</h3>
                        <form id="reportForm" class="row g-2">
                            <div class="col-12">
                                <label for="reportBookSelect" class="form-label">Книга</label>
                                <select id="reportBookSelect" class="form-select"></select>
                            </div>
                            <div class="col-12">
                                <label for="reportBranchSelect" class="form-label">Филиал</label>
                                <select id="reportBranchSelect" class="form-select"></select>
                            </div>
                            <div class="col-12 d-grid">
                                <button class="btn btn-primary" type="submit">Показать отчет</button>
                            </div>
                        </form>

                        <div class="mt-4" id="reportResultBlock">
                            <div class="report-metric mb-3">
                                <span class="report-metric-label">Количество экземпляров:</span>
                                <span id="reportCopiesValue" class="report-metric-value">-</span>
                            </div>
                            <div class="report-metric mb-3">
                                <span class="report-metric-label">Количество факультетов:</span>
                                <span id="reportFacultiesCountValue" class="report-metric-value">-</span>
                            </div>
                            <div class="table-responsive">
                                <table class="table table-sm" id="reportFacultiesTable">
                                    <thead>
                                        <tr>
                                            <th>Факультет</th>
                                            <th>Количество</th>
                                        </tr>
                                    </thead>
                                    <tbody></tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-12 col-xl-6">
                <div class="card section-card h-100">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <h3 class="h5 m-0">Самые выдаваемые книги</h3>
                            <button id="refreshTopIssuedBtn" class="btn btn-outline-secondary btn-sm" type="button">Обновить</button>
                        </div>
                        <div class="table-responsive">
                            <table class="table table-striped align-middle" id="topIssuedTable">
                                <thead>
                                    <tr>
                                        <th>Название</th>
                                        <th>Выдано раз</th>
                                    </tr>
                                </thead>
                                <tbody></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div class="position-fixed top-0 end-0 p-3 toast-zone">
        <div id="appToast" class="toast align-items-center border-0" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="d-flex">
                <div id="appToastBody" class="toast-body"></div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/app.js"></script>
</body>
</html>
