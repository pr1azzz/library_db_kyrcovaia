<!doctype html>
<html lang="ru" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0f7285">
    <title>ИС Библиотеки | Книги</title>
    <link rel="manifest" href="/manifest.webmanifest">
    <link rel="icon" href="/static/icons/icon.svg" type="image/svg+xml">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body data-page="books">
    <header class="topbar shadow-sm">
        <div class="container-fluid header-shell">
            <div class="header-brand">
                <h1 class="m-0 app-title">Library IS</h1>
                <button id="themeToggleBtn" class="btn btn-sm btn-outline-light d-lg-none" type="button">Тема</button>
            </div>

            <nav class="nav nav-pills nav-compact header-nav" id="mainNav">
                <a class="nav-link" href="/dashboard" data-page="dashboard">Дашборд</a>
                <a class="nav-link" href="/books" data-page="books">Книги</a>
                <a class="nav-link" href="/branches" data-page="branches">Филиалы</a>
                <a class="nav-link" href="/reports" data-page="reports" data-admin-only>Отчеты</a>
            </nav>

            <div class="header-tools">
                <button id="themeToggleBtnDesktop" class="btn btn-sm btn-outline-light d-none d-lg-inline-flex" type="button">
                    Сменить тему
                </button>
                <div id="authBox" class="auth-box d-flex align-items-center gap-2 flex-wrap justify-content-end"></div>
            </div>
        </div>
    </header>

    <main class="container-fluid main-content">
        <div class="d-flex flex-column flex-lg-row justify-content-between align-items-lg-center gap-2 mb-3">
            <h2 class="h3 page-title m-0">Книги</h2>
            <button id="addBookBtn" class="btn btn-primary" type="button" data-admin-only data-bs-toggle="modal" data-bs-target="#bookModal">
                Добавить книгу
            </button>
        </div>

        <div class="card section-card mb-3">
            <div class="card-body">
                <h3 class="h6 mb-3">Фильтрация</h3>
                <form id="bookFilterForm" class="row g-2">
                    <div class="col-12 col-md-4">
                        <input id="filterAuthor" type="text" class="form-control" placeholder="Автор">
                    </div>
                    <div class="col-12 col-md-4">
                        <input id="filterPublisher" type="text" class="form-control" placeholder="Издательство">
                    </div>
                    <div class="col-12 col-md-2">
                        <input id="filterYear" type="number" min="1500" max="3000" class="form-control" placeholder="Год">
                    </div>
                    <div class="col-12 col-md-2 d-grid">
                        <button class="btn btn-outline-primary" type="submit">Применить</button>
                    </div>
                </form>
            </div>
        </div>

        <div class="card section-card">
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover align-middle" id="booksTable">
                        <thead>
                            <tr>
                                <th>Название</th>
                                <th>Автор</th>
                                <th>Год</th>
                                <th>Издательство</th>
                                <th>Цена</th>
                                <th class="text-end">Действия</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <div class="modal fade" id="bookModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-scrollable">
            <div class="modal-content">
                <form id="bookForm">
                    <div class="modal-header">
                        <h5 class="modal-title" id="bookModalTitle">Добавить книгу</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Закрыть"></button>
                    </div>
                    <div class="modal-body">
                        <input id="bookId" type="hidden">
                        <div class="row g-2">
                            <div class="col-12">
                                <label for="bookTitle" class="form-label">Название</label>
                                <input id="bookTitle" type="text" class="form-control" required>
                            </div>
                            <div class="col-12 col-md-6">
                                <label for="bookYear" class="form-label">Год издания</label>
                                <input id="bookYear" type="number" min="1500" max="3000" class="form-control">
                            </div>
                            <div class="col-12 col-md-6">
                                <label for="bookPrice" class="form-label">Цена</label>
                                <input id="bookPrice" type="number" min="0" step="0.01" class="form-control">
                            </div>
                            <div class="col-12 col-md-6">
                                <label for="bookPages" class="form-label">Страниц</label>
                                <input id="bookPages" type="number" min="1" class="form-control">
                            </div>
                            <div class="col-12 col-md-6">
                                <label for="bookIllustrations" class="form-label">Иллюстраций</label>
                                <input id="bookIllustrations" type="number" min="0" class="form-control">
                            </div>
                            <div class="col-12">
                                <label for="bookPublisher" class="form-label">Издательство</label>
                                <input id="bookPublisher" type="text" class="form-control">
                            </div>
                            <div class="col-12">
                                <label for="bookAuthors" class="form-label">Авторы (через запятую)</label>
                                <input id="bookAuthors" type="text" class="form-control" placeholder="Например: Роберт Мартин, Кент Бек">
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Отмена</button>
                        <button type="submit" class="btn btn-primary">Сохранить</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div class="modal fade" id="bookDetailsModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="bookDetailsTitle">Информация о книге</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Закрыть"></button>
                </div>
                <div class="modal-body">
                    <div class="book-details-grid">
                        <div class="book-detail-item">
                            <span>Авторы</span>
                            <strong id="bookDetailsAuthors">-</strong>
                        </div>
                        <div class="book-detail-item">
                            <span>Год издания</span>
                            <strong id="bookDetailsYear">-</strong>
                        </div>
                        <div class="book-detail-item">
                            <span>Издательство</span>
                            <strong id="bookDetailsPublisher">-</strong>
                        </div>
                        <div class="book-detail-item">
                            <span>Стоимость</span>
                            <strong id="bookDetailsPrice">-</strong>
                        </div>
                        <div class="book-detail-item">
                            <span>Количество страниц</span>
                            <strong id="bookDetailsPages">-</strong>
                        </div>
                        <div class="book-detail-item">
                            <span>Количество иллюстраций</span>
                            <strong id="bookDetailsIllustrations">-</strong>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Закрыть</button>
                </div>
            </div>
        </div>
    </div>

    <div class="position-fixed top-0 end-0 p-3 toast-zone">
        <div id="appToast" class="toast align-items-center border-0" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="d-flex">
                <div id="appToastBody" class="toast-body"></div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/app.js"></script>
</body>
</html>
